name: Benchmark

on:
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against (e.g. main)"
        required: false
        default: "main"
        type: string
      compare_ref:
        description: "Ref to benchmark (e.g. feature/my-branch)"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  benchmark-io:
    name: I/O Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Checkout compare ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.compare_ref || github.sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Extract benchmark fixture
        run: unzip tests/fixtures/benchmark-plugin-1000-skills.zip -d /tmp/bench-plugin

      - name: Drop OS page cache
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run I/O benchmark tests
        run: |
          source .venv/bin/activate
          pytest tests/benchmarks/test_benchmark.py -v --no-header -p no:xdist --no-cov --override-ini="addopts="

      - name: Run bench_io for github-action-benchmark output
        run: |
          set -o pipefail
          source .venv/bin/activate
          mkdir -p scripts/results
          BENCH_IO=scripts/bench_io.py
          if [ ! -f "$BENCH_IO" ]; then
            echo "scripts/bench_io.py not found on this ref; skipping bench_io run."
            exit 0
          fi
          python "$BENCH_IO" /tmp/bench-plugin --output scripts/results/bench_io_gh.json | tee scripts/results/benchmark_results.json

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || \
            git checkout --orphan gh-pages && \
            git reset --hard && \
            git commit --allow-empty -m "init gh-pages for benchmark graphs" && \
            git push origin gh-pages && \
            git checkout -

      - name: Store I/O benchmark result
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: scripts/results/bench_io_gh.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@bitflight-devops'
          benchmark-data-dir-path: dev/bench

      - name: Upload compare benchmark results
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-compare
          path: scripts/results/benchmark_results.json
          retention-days: 30

      - name: Preserve bench_io.py before base-ref checkout
        if: github.event_name == 'pull_request'
        run: |
          if [ -f scripts/bench_io.py ]; then
            cp scripts/bench_io.py /tmp/bench_io.py
          fi
          if [ -f scripts/bench_ratio.py ]; then
            cp scripts/bench_ratio.py /tmp/bench_ratio.py
          fi

      - name: Checkout base ref
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0
          clean: false

      - name: Drop OS page cache (base ref)
        if: github.event_name == 'pull_request'
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run base I/O benchmark
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          source .venv/bin/activate
          BENCH_IO=scripts/bench_io.py
          if [ ! -f "$BENCH_IO" ]; then
            BENCH_IO=/tmp/bench_io.py
          fi
          python "$BENCH_IO" /tmp/bench-plugin --output scripts/results/bench_io_base_gh.json | tee scripts/results/benchmark_results_base.json

      - name: Upload base benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-base
          path: scripts/results/benchmark_results_base.json
          retention-days: 30

      - name: Compute and print performance ratio
        if: github.event_name == 'pull_request'
        run: |
          source .venv/bin/activate
          BENCH_RATIO=scripts/bench_ratio.py
          if [ ! -f "$BENCH_RATIO" ]; then
            BENCH_RATIO=/tmp/bench_ratio.py
          fi
          python "$BENCH_RATIO" \
            --compare scripts/results/benchmark_results.json \
            --base scripts/results/benchmark_results_base.json

  benchmark-cpu:
    name: CPU/Logic Performance Benchmark
    runs-on: ubuntu-latest
    if: github.event_name != 'release'
    steps:
      - name: Checkout compare ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.compare_ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Drop OS page cache (CPU benchmark)
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run CPU benchmark tests
        run: |
          source .venv/bin/activate
          pytest scripts/bench_cpu.py -v --no-header -p no:xdist --no-cov --override-ini="addopts="

      - name: Drop OS page cache (bench_cpu output)
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run bench_cpu for github-action-benchmark output
        run: |
          source .venv/bin/activate
          python scripts/bench_cpu.py --output scripts/results/bench_cpu_gh.json

      - name: Store CPU benchmark result
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: scripts/results/bench_cpu_gh.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench

      - name: Upload CPU benchmark results
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-cpu
          path: scripts/results/
          retention-days: 30

  benchmark-release:
    name: Release Benchmark
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Extract benchmark fixture
        run: unzip tests/fixtures/benchmark-plugin-1000-skills.zip -d /tmp/bench-plugin

      - name: Drop OS page cache
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Resolve base ref tag
        id: base_ref
        run: |
          source .venv/bin/activate
          BASE=$(python scripts/resolve_base_ref.py --tag "${{ github.ref_name }}" 2>/dev/null || echo "")
          echo "tag=${BASE}" >> "$GITHUB_OUTPUT"

      - name: Run I/O benchmark (release)
        run: |
          source .venv/bin/activate
          mkdir -p scripts/results
          python scripts/bench_io.py /tmp/bench-plugin --output scripts/results/bench_io_gh.json | tee scripts/results/benchmark_results.json

      - name: Run CPU benchmark (release)
        run: |
          source .venv/bin/activate
          python scripts/bench_cpu.py --output scripts/results/bench_cpu_gh.json

      - name: Preserve bench_io.py before base-ref checkout
        run: |
          if [ -f scripts/bench_io.py ]; then
            cp scripts/bench_io.py /tmp/bench_io_release.py
          fi

      - name: Checkout base ref for comparison
        if: steps.base_ref.outputs.tag != ''
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ steps.base_ref.outputs.tag }}
          fetch-depth: 0
          clean: false

      - name: Drop OS page cache (base ref)
        if: steps.base_ref.outputs.tag != ''
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run base I/O benchmark
        if: steps.base_ref.outputs.tag != ''
        run: |
          source .venv/bin/activate
          BENCH_IO=scripts/bench_io.py
          if [ ! -f "$BENCH_IO" ]; then BENCH_IO=/tmp/bench_io_release.py; fi
          python "$BENCH_IO" /tmp/bench-plugin --output scripts/results/bench_io_base_gh.json | tee scripts/results/benchmark_results_base.json

      - name: Compute and print performance ratio
        if: steps.base_ref.outputs.tag != ''
        run: |
          source .venv/bin/activate
          python scripts/bench_ratio.py \
            --compare scripts/results/benchmark_results.json \
            --base scripts/results/benchmark_results_base.json

      - name: Ensure gh-pages branch exists
        run: |
          git fetch origin gh-pages:gh-pages 2>/dev/null || \
            git checkout --orphan gh-pages && \
            git reset --hard && \
            git commit --allow-empty -m "init gh-pages for benchmark graphs" && \
            git push origin gh-pages && \
            git checkout -

      - name: Store I/O benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: scripts/results/bench_io_gh.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench

      - name: Upload release benchmark results
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-benchmark-${{ github.ref_name }}
          path: scripts/results/
          retention-days: 90
