name: Benchmark

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_ref:
        description: "Base ref to compare against (e.g. main)"
        required: false
        default: "main"
        type: string
      compare_ref:
        description: "Ref to benchmark (e.g. feature/my-branch)"
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  deployments: write
  pull-requests: write

jobs:
  benchmark-io:
    name: I/O Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout compare ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.compare_ref || github.sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Extract benchmark fixture
        run: unzip tests/fixtures/benchmark-plugin-1000-skills.zip -d /tmp/bench-plugin

      - name: Drop OS page cache
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run I/O benchmark tests
        run: |
          source .venv/bin/activate
          pytest tests/benchmarks/test_benchmark.py -v --no-header -p no:xdist --no-cov --override-ini="addopts="

      - name: Run bench_io for github-action-benchmark output
        run: |
          set -o pipefail
          source .venv/bin/activate
          mkdir -p scripts/results
          BENCH_IO=scripts/bench_io.py
          if [ ! -f "$BENCH_IO" ]; then
            echo "scripts/bench_io.py not found on this ref; skipping bench_io run."
            exit 0
          fi
          python "$BENCH_IO" /tmp/bench-plugin --output scripts/results/bench_io_gh.json | tee scripts/results/benchmark_results.json

      - name: Store I/O benchmark result
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: scripts/results/bench_io_gh.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          alert-comment-cc-users: '@bitflight-devops'
          benchmark-data-dir-path: dev/bench

      - name: Upload compare benchmark results
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-compare
          path: scripts/results/benchmark_results.json
          retention-days: 30

      - name: Preserve bench_io.py before base-ref checkout
        if: github.event_name == 'pull_request'
        run: |
          if [ -f scripts/bench_io.py ]; then
            cp scripts/bench_io.py /tmp/bench_io.py
          fi

      - name: Checkout base ref
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.base_ref }}
          fetch-depth: 0
          clean: false

      - name: Drop OS page cache (base ref)
        if: github.event_name == 'pull_request'
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run base I/O benchmark
        if: github.event_name == 'pull_request'
        run: |
          set -o pipefail
          source .venv/bin/activate
          BENCH_IO=scripts/bench_io.py
          if [ ! -f "$BENCH_IO" ]; then
            BENCH_IO=/tmp/bench_io.py
          fi
          python "$BENCH_IO" /tmp/bench-plugin --output scripts/results/bench_io_base_gh.json | tee scripts/results/benchmark_results_base.json

      - name: Upload base benchmark results
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-base
          path: scripts/results/benchmark_results_base.json
          retention-days: 30

      - name: Compute and print performance ratio
        if: github.event_name == 'pull_request'
        run: |
          uv run python - <<'EOF'
          import json, pathlib, sys

          compare_file = pathlib.Path("scripts/results/benchmark_results.json")
          base_file = pathlib.Path("scripts/results/benchmark_results_base.json")

          if not compare_file.exists() or not base_file.exists():
              print("Skipping ratio computation: result files not found.")
              sys.exit(0)

          compare_text = compare_file.read_text().strip()
          base_text = base_file.read_text().strip()

          if not compare_text or not base_text:
              print("Skipping ratio computation: one or both result files are empty.")
              sys.exit(0)

          compare_data = json.loads(compare_text)
          base_data = json.loads(base_text)

          # compare_data: list of result dicts with duration_seconds (seconds)
          if isinstance(compare_data, list) and compare_data:
              last = compare_data[-1]
              if "duration_seconds" in last:
                  compare_duration = float(last["duration_seconds"])  # already in seconds
              elif "mean_ms" in last:
                  compare_duration = float(last["mean_ms"]) / 1000.0  # convert ms → s
              else:
                  print("compare_data entry missing duration_seconds or mean_ms", file=sys.stderr)
                  sys.exit(0)
          elif isinstance(compare_data, dict):
              if "duration_seconds" in compare_data:
                  compare_duration = float(compare_data["duration_seconds"])
              elif "mean_ms" in compare_data:
                  compare_duration = float(compare_data["mean_ms"]) / 1000.0
              else:
                  print("compare_data missing duration_seconds or mean_ms", file=sys.stderr)
                  sys.exit(0)
          else:
              compare_duration = 0

          # base_data: dict with mean_ms (milliseconds)
          if isinstance(base_data, dict) and "mean_ms" in base_data:
              base_duration = float(base_data["mean_ms"]) / 1000.0  # mean_ms is ms; convert to seconds
          elif isinstance(base_data, dict) and "duration_seconds" in base_data:
              base_duration = float(base_data["duration_seconds"])  # already in seconds
          else:
              print("base_data missing mean_ms or duration_seconds", file=sys.stderr)
              sys.exit(0)

          if base_duration > 0 and compare_duration > 0:
              ratio = compare_duration / base_duration
              change_pct = (ratio - 1.0) * 100.0
              direction = "slower" if ratio > 1.0 else "faster"
              print(
                  f"BENCHMARK RATIO: compare={compare_duration:.2f}s  "
                  f"base={base_duration:.2f}s  "
                  f"ratio={ratio:.3f}x ({abs(change_pct):.1f}% {direction})"
              )
          else:
              print("Could not compute ratio: one or both durations are zero.")
          EOF

  benchmark-cpu:
    name: CPU/Logic Performance Benchmark
    runs-on: ubuntu-latest
    steps:
      - name: Checkout compare ref
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.compare_ref || github.sha }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Drop OS page cache (CPU benchmark)
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run CPU benchmark tests
        run: |
          source .venv/bin/activate
          pytest scripts/bench_cpu.py -v --no-header -p no:xdist --no-cov --override-ini="addopts="

      - name: Drop OS page cache (bench_cpu output)
        run: echo 3 | sudo tee /proc/sys/vm/drop_caches || true

      - name: Run bench_cpu for github-action-benchmark output
        run: |
          source .venv/bin/activate
          python scripts/bench_cpu.py --output scripts/results/bench_cpu_gh.json

      - name: Store CPU benchmark result
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: customSmallerIsBetter
          output-file-path: scripts/results/bench_cpu_gh.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '130%'
          comment-on-alert: true
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench

      - name: Upload CPU benchmark results
        uses: actions/upload-artifact@v7.0.0
        with:
          name: benchmark-results-cpu
          path: scripts/results/
          retention-days: 30
